# Hardened nginx example for demo.example.com.
# Copy relevant parts manually into the existing SSL server block.
# Do not expose backend port 3101 publicly. Nginx proxies to localhost only.
#
# CORS is intentionally not configured here. Keep CORS controlled by the
# backend CORS_ORIGINS whitelist, never wildcard at nginx.

server {
    listen 443 ssl http2;
    server_name demo.example.com;

    # Existing SSL certificate directives stay in the real host config.
    # ssl_certificate /etc/letsencrypt/live/demo.example.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/demo.example.com/privkey.pem;

    client_max_body_size 1m;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/manifest+json
        application/rss+xml
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/xml
        font/opentype
        image/svg+xml
        text/css
        text/plain
        text/xml;

    # Brotli is optional and only works if the nginx brotli module is installed.
    # brotli on;
    # brotli_comp_level 5;
    # brotli_types application/javascript application/json image/svg+xml text/css text/plain;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;

    # API only. Keep the existing frontend "/" handling unchanged.
    location /api/ {
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Request-Id $request_id;

        # Safe websocket/upgrade support for future Telegram mini-app or realtime API.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;

        proxy_buffering off;
        proxy_request_buffering on;
    }
}

# Required in nginx http{} context if websocket support is enabled above:
#
# map $http_upgrade $connection_upgrade {
#     default upgrade;
#     '' close;
# }
